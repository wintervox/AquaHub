<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goods Sales – Pure Flow Refill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark"></span> Aqua Hub</a>
    <nav class="links">
      <a href="index.html">Home</a>
      <a href="stock.html">Pricing</a>
      <a href="gallery.html">Gallery</a>
      <a href="sales.html" class="active">Sales</a>
    </nav>
    <a href="sales-water.html" class="btn btn-ghost btn-small">Switch to Water</a>
  </div>
</header>

<main>
  <div class="wrap sales-page">
    <a href="sales.html" style="display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--slate);margin-bottom:16px;">&larr; Back to Sales</a>

    <h1>🛒 Goods Sales</h1>
    <p class="sub">Tap a product button each time you make a sale. Every tap is logged instantly.</p>

    <!-- Staff name -->
    <div class="staff-row">
      <label for="staffName">Staff on duty:</label>
      <input type="text" id="staffName" placeholder="Your name" maxlength="40">
    </div>
    <div id="staffWelcome" class="empty-note" style="display:none;margin-top:-8px;"></div>
    <div class="staff-row" style="margin-top:8px;">
      <button class="btn btn-primary btn-small" id="submitSalesBtn">Submit Sales</button>
    </div>

    <!-- POS buttons -->
    <div id="posGrid" class="pos-grid">
      <div class="empty-note" id="posLoading">Loading goods items&hellip;</div>
    </div>

    <!-- Today's summary pills -->
    <div class="sales-summary" id="todaySummary"></div>

    <!-- Today's sales log -->
    <div class="panel" style="margin-top:16px;">
      <h3>Today's goods sales log</h3>
      <div class="table-scroll">
        <table id="salesTable" class="hide">
          <thead><tr><th>Item</th><th class="num">Price</th><th>Staff</th><th>Time</th></tr></thead>
          <tbody id="salesBody"></tbody>
        </table>
      </div>
      <div id="noSalesNote" class="empty-note">No goods sold today.</div>
    </div>
  </div>
</main>

<script src="shop-data.js"></script>
<script src="sales-goods.js"></script>
</body>
</html>
